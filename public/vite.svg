<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Rich Premium White gradient for the text and dot (Pearlescent/Silver sheen) -->
    <linearGradient id="premiumWhite" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#f2f2f5" />
      <stop offset="100%" stop-color="#c7c7cc" />
    </linearGradient>

    <!-- Deep obsidian background gradient for the inside to give an expensive, top-lit look -->
    <radialGradient id="blackBg" cx="50%" cy="10%" r="90%">
      <stop offset="0%" stop-color="#1f1f22" />
      <stop offset="60%" stop-color="#050505" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>

    <!-- Pure solid black for the ring itself, with a slight drop shadow to lift the white text -->
    <filter id="premiumShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.9" />
    </filter>
  </defs>

  <!-- 
    The black circular background inside the ring.
  -->
  <circle cx="250" cy="250" r="220" fill="url(#blackBg)" />

  <!-- 
    The pure black ring. 
  -->
  <circle cx="250" cy="250" r="220" fill="none" stroke="#000000" stroke-width="24" />

  <!-- 
    Ultra-subtle inner and outer rim highlights (opacity 10-15%).
    This ensures the black ring stays visible and looks distinctly like a 
    premium physical badge, even if placed on a completely black webpage.
  -->
  <circle cx="250" cy="250" r="208" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.10" />
  <circle cx="250" cy="250" r="232" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.15" />

  <!-- Container for the stylized "●SP" with deep shadow for contrast -->
  <g filter="url(#premiumShadow)">
    
    <!-- The geometric Dot -->
    <circle cx="130" cy="245" r="27" fill="url(#premiumWhite)" />

    <!-- 
      "SP" Text - Sleek, italicized, and heavy to maintain the stylized look.
      Filled with the rich premium white gradient.
    -->
    <text 
      x="305" y="254" 
      dominant-baseline="central" 
      text-anchor="middle" 
      font-family="system-ui, -apple-system, 'Helvetica Neue', 'Arial Black', sans-serif" 
      font-size="160" 
      font-weight="900" 
      font-style="italic" 
      fill="url(#premiumWhite)"
      letter-spacing="2">
      SP
    </text>
  </g>
</svg>