<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Vibrant, modern gradient for the ring and dot (Neon Pink to Gold) -->
    <linearGradient id="sexyGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff1361" />
      <stop offset="50%" stop-color="#ff7b00" />
      <stop offset="100%" stop-color="#fff800" />
    </linearGradient>

    <!-- Sleek metallic silver gradient for the "SP" text -->
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#a0a5b0" />
    </linearGradient>

    <!-- Premium dark backdrop strictly inside the ring to make elements pop -->
    <radialGradient id="innerBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#242435" />
      <stop offset="100%" stop-color="#0f0f15" />
    </radialGradient>

    <!-- Soft drop shadow for inner elements to add depth -->
    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.6" />
    </filter>
  </defs>

  <!-- 
    The background outside the circle is completely transparent. 
    Only the circular boundary and its inner fill are rendered. 
  -->
  <circle 
    cx="250" cy="250" r="220" 
    fill="url(#innerBg)" 
    stroke="url(#sexyGrad)" 
    stroke-width="18" 
  />

  <!-- Inner subtle highlight ring to enhance the stylized look -->
  <circle 
    cx="250" cy="250" r="195" 
    fill="none" 
    stroke="#ffffff" 
    stroke-width="2" 
    opacity="0.1" 
  />

  <!-- Container for the stylized "●SP" -->
  <g filter="url(#innerShadow)">
    
    <!-- 
      Using a pure geometric circle for the dot guarantees perfect 
      alignment and circularity regardless of system fonts.
    -->
    <circle cx="135" cy="245" r="28" fill="url(#sexyGrad)" />

    <!-- 
      "SP" Text - Styled with heavy font weight, italic slant for speed/style, 
      and a sleek silver gradient.
    -->
    <text 
      x="300" y="254" 
      dominant-baseline="central" 
      text-anchor="middle" 
      font-family="system-ui, -apple-system, 'Helvetica Neue', 'Arial Black', sans-serif" 
      font-size="160" 
      font-weight="900" 
      font-style="italic" 
      fill="url(#silverGrad)"
      letter-spacing="2">
      SP
    </text>
  </g>
</svg>